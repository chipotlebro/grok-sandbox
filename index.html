<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonnie's Grok Buddy - Debug</title>
    <style>
        body { font-family: Arial, sans-serif; background: #ff69b4; margin: 0; padding: 20px; }
        .chat { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; }
        button { padding: 20px 40px; font-size: 1.6em; background: white; border: 4px solid #4a90e2; border-radius: 50px; }
        pre { background: #f0f0f0; padding: 10px; overflow: auto; max-height: 300px; }
    </style>
</head>
<body>
    <div class="chat">
        <h1>Bonnie's Grok Buddy - Debug Mode</h1>
        <button onclick="toggleContinuous()">🎤 Start Voice Chat</button>
        <div id="status">Status: Ready</div>
        <div id="output"></div>
        <pre id="log"></pre>
    </div>

    <script>
        const GROQ_API_KEY = "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";
        let continuousRecognition = null;
        let isContinuousOn = false;

        function log(msg) {
            const logEl = document.getElementById('log');
            logEl.textContent += msg + "\n";
            console.log(msg);
        }

        async function sendMessage(userText) {
            log("Sending: " + userText);
            document.getElementById('output').innerHTML += `<p><b>You:</b> ${userText}</p>`;

            const thinking = document.getElementById('output');
            thinking.innerHTML += `<p><b>Grok:</b> Thinking... </p>`;

            try {
                log("Making API call...");
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json", 
                        "Authorization": `Bearer ${GROQ_API_KEY}` 
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "user", content: userText }],
                        max_tokens: 150
                    })
                });

                log("Response status: " + res.status);

                if (!res.ok) {
                    const errorText = await res.text();
                    log("Error body: " + errorText);
                    throw new Error("API Error " + res.status);
                }

                const data = await res.json();
                const reply = data.choices[0].message.content;
                log("Success! Reply: " + reply);

                document.getElementById('output').innerHTML += `<p><b>Grok:</b> ${reply}</p>`;
            } catch(e) {
                log("Catch error: " + e.message);
                document.getElementById('output').innerHTML += `<p><b>Error:</b> ${e.message}</p>`;
            }
        }

        function toggleContinuous() {
            if (isContinuousOn) {
                if (continuousRecognition) continuousRecognition.stop();
                isContinuousOn = false;
                document.getElementById('status').innerHTML = "Stopped";
            } else {
                startContinuous();
                isContinuousOn = true;
                document.getElementById('status').innerHTML = "Listening...";
            }
        }

        function startContinuous() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Voice not supported");
                return;
            }

            continuousRecognition = new SpeechRecognition();
            continuousRecognition.continuous = true;
            continuousRecognition.interimResults = false;

            continuousRecognition.onresult = (event) => {
                const spoken = event.results[event.results.length-1][0].transcript.trim();
                if (spoken.length > 3) sendMessage(spoken);
            };

            continuousRecognition.onerror = (e) => log("Voice error: " + e.error);
            continuousRecognition.onend = () => { if (isContinuousOn) setTimeout(startContinuous, 800); };

            continuousRecognition.start();
            log("Voice recognition started");
        }
    </script>
</body>
</html>
