<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonnie's Friend</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            background: linear-gradient(135deg, #a8e6cf, #d0a3ff); 
            margin: 0; padding: 0; color: #333; 
            text-align: center; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
        }
        .header { 
            background: linear-gradient(#ff69b4, #4a90e2); 
            color: white; 
            padding: 15px; 
            font-size: 2.2em; 
        }
        .avatar-container { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            position: relative;
        }
        .avatar { 
            width: 85%; 
            max-width: 420px; 
            height: 85%; 
            max-height: 420px; 
            background: url('https://i.imgur.com/7Z3qKzL.png') center/contain no-repeat; 
            border-radius: 50%; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.3); 
            transition: transform 0.3s;
        }
        .talking { 
            animation: talk 0.45s infinite alternate ease-in-out; 
        }
        @keyframes talk { 
            from { transform: scale(1) rotate(-3deg); } 
            to { transform: scale(1.12) rotate(3deg); } 
        }
        .messages { 
            max-height: 25vh; 
            overflow-y: auto; 
            padding: 15px; 
            background: rgba(255,255,255,0.9); 
            margin: 10px; 
            border-radius: 20px; 
            text-align: left;
        }
        .message { 
            margin: 12px 0; 
            padding: 14px 18px; 
            border-radius: 20px; 
            font-size: 1.15em; 
        }
        .grok { background: #fff; border: 3px solid #ff69b4; }
        button { 
            padding: 18px 40px; 
            background: #ff69b4; 
            color: white; 
            border: none; 
            font-size: 1.5em; 
            cursor: pointer; 
            border-radius: 50px; 
            margin: 15px; 
        }
        .status { color: #ff69b4; font-weight: bold; padding: 10px; }
    </style>
</head>
<body>
    <div class="header">Bonnie's Mermaid Friend 🧜‍♀️</div>
    
    <div class="avatar-container">
        <div class="avatar" id="avatar"></div>
    </div>

    <div class="messages" id="messages">
        <div class="message grok">Hi Bonnie! I'm your mermaid friend! Talk to me anytime ✨</div>
    </div>

    <div style="padding: 15px; background: white;">
        <button onclick="toggleContinuous()">🎤 Start Talking to Me</button>
    </div>
    <div class="status" id="status">Press the button to start</div>

    <script>
        const GROQ_API_KEY = "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";
        const messagesDiv = document.getElementById('messages');
        const avatar = document.getElementById('avatar');
        const utterance = new SpeechSynthesisUtterance();
        let continuousRecognition = null;
        let isContinuousOn = false;
        let isSpeaking = false;

        function addMessage(text, sender) {
            const msg = document.createElement('div');
            msg.className = `message ${sender}`;
            msg.textContent = text;
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function cleanForSpeech(text) {
            return text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
        }

        function speak(text) {
            isSpeaking = true;
            avatar.classList.add('talking');
            const cleanText = cleanForSpeech(text);
            utterance.text = cleanText;
            utterance.pitch = 1.45;
            utterance.rate = 0.82;   // Slower
            utterance.onend = () => {
                isSpeaking = false;
                avatar.classList.remove('talking');
            };
            speechSynthesis.speak(utterance);
        }

        async function sendMessage(userText) {
            if (isSpeaking) return;

            addMessage(userText, 'user');

            const thinking = addMessage("Thinking... 🤔", 'grok');

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "You are a warm, playful mermaid friend for 5-year-old Bonnie. Use very simple words, be magical and fun. Keep answers short." },
                            { role: "user", content: userText }
                        ],
                        temperature: 0.9,
                        max_tokens: 280
                    })
                });

                const data = await res.json();
                const reply = data.choices[0].message.content;
                thinking.remove();
                addMessage(reply, 'grok');
                speak(reply);
            } catch(e) {
                thinking.remove();
                const errMsg = "Oopsie! Try again 🐻";
                addMessage(errMsg, 'grok');
                speak(errMsg);
            }
        }

        function toggleContinuous() {
            const status = document.getElementById('status');
            if (isContinuousOn) {
                if (continuousRecognition) continuousRecognition.stop();
                isContinuousOn = false;
                status.textContent = "Listening stopped";
            } else {
                startContinuousListening();
                isContinuousOn = true;
                status.textContent = "🎤 Listening... Talk to me!";
            }
        }

        function startContinuousListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Voice not supported.");

            continuousRecognition = new SpeechRecognition();
            continuousRecognition.continuous = true;
            continuousRecognition.interimResults = false;
            continuousRecognition.lang = "en-US";

            continuousRecognition.onresult = (event) => {
                if (isSpeaking) return;
                const spoken = event.results[event.results.length - 1][0].transcript.trim();
                if (spoken.length > 3) sendMessage(spoken);
            };

            continuousRecognition.onerror = () => { if (isContinuousOn) setTimeout(startContinuousListening, 1000); };
            continuousRecognition.onend = () => { if (isContinuousOn) setTimeout(startContinuousListening, 600); };

            continuousRecognition.start();
        }
    </script>
</body>
</html>
