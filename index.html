<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug</title>
    <style>
        body { font-family: Arial; background: #ff69b4; padding: 20px; }
        button { padding: 20px 40px; font-size: 1.5em; }
        pre { background: black; color: lime; padding: 15px; overflow: auto; max-height: 400px; }
    </style>
</head>
<body>
    <h1>Debug Mode</h1>
    <button onclick="startTest()">Start Voice Test</button>
    <pre id="log"></pre>

    <script>
        const KEY = "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";

        function log(msg) {
            document.getElementById('log').textContent += msg + "\n";
        }

        async function startTest() {
            log("Starting test...");
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "user", content: "Hello Bonnie" }],
                        max_tokens: 30
                    })
                });

                log("Status: " + res.status);

                if (!res.ok) {
                    const err = await res.text();
                    log("Error: " + err);
                    return;
                }

                const data = await res.json();
                log("Success: " + data.choices[0].message.content);
            } catch(e) {
                log("Failed: " + e.message);
            }
        }
    </script>
</body>
</html>
