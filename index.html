<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonnie's Grok Buddy</title>
    <style>
        body { font-family: Arial, sans-serif; background: #ff69b4; margin: 0; padding: 20px; }
        .chat { max-width: 700px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; }
        button { padding: 15px 30px; font-size: 1.4em; background: white; border: 3px solid #4a90e2; border-radius: 50px; }
    </style>
</head>
<body>
    <div class="chat">
        <h1>Bonnie's Grok Buddy</h1>
        <button onclick="testAPI()">Test Grok</button>
        <div id="output" style="margin-top:20px; font-size:1.2em;"></div>
    </div>

    <script>
        const GROQ_API_KEY = "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";

        async function testAPI() {
            const output = document.getElementById('output');
            output.innerHTML = "Sending request...";

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "user", content: "Say hello to Bonnie" }],
                        max_tokens: 50
                    })
                });

                if (!res.ok) {
                    const error = await res.text();
                    output.innerHTML = "Error: " + error;
                    console.error(error);
                    return;
                }

                const data = await res.json();
                const reply = data.choices[0].message.content;
                output.innerHTML = "Grok says: " + reply;
            } catch(e) {
                output.innerHTML = "Failed: " + e.message;
                console.error(e);
            }
        }
    </script>
</body>
</html>
