<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonnie's Grok Buddy 🌟</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: linear-gradient(135deg, #ff9a9e, #fad0c4); margin: 0; padding: 20px; color: #333; }
        .chat-container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #4a90e2; color: white; padding: 20px; text-align: center; font-size: 2.2em; }
        .messages { height: 60vh; overflow-y: auto; padding: 20px; background: #f9f9f9; }
        .message { margin: 15px 0; padding: 15px 20px; border-radius: 20px; max-width: 80%; font-size: 1.1em; line-height: 1.4; }
        .user { background: #4a90e2; color: white; margin-left: auto; border-bottom-right-radius: 5px; }
        .grok { background: #fff; border: 2px solid #ff6b6b; margin-right: auto; border-bottom-left-radius: 5px; }
        input { width: 100%; padding: 18px; border: none; font-size: 1.2em; box-sizing: border-box; }
        button { padding: 15px 25px; background: #ff6b6b; color: white; border: none; font-size: 1.2em; cursor: pointer; border-radius: 10px; margin: 5px; }
        .kid-safe { text-align: center; color: #666; padding: 15px; font-size: 0.95em; }
        .status { text-align: center; color: #4a90e2; font-weight: bold; padding: 5px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">🌟 Bonnie's Grok Buddy 🌟</div>
        <div class="messages" id="messages">
            <div class="message grok">Hi Bonnie! I'm your super fun Grok buddy 🦄 Talk to me anytime!</div>
        </div>
        <input type="text" id="userInput" placeholder="Type here if you want..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <div style="padding: 10px; text-align: center; background: white;">
            <button onclick="toggleContinuous()">🎤 Continuous Listen (On/Off)</button>
        </div>
        <div class="status" id="status">Continuous listening is OFF</div>
        <div class="kid-safe">Made with love for Bonnie • Supervised by Daddy</div>
    </div>

    <script>
        const GROQ_API_KEY = "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";
        const messagesDiv = document.getElementById('messages');
        const utterance = new SpeechSynthesisUtterance();
        let continuousRecognition = null;
        let isContinuousOn = false;

        function addMessage(text, sender) {
            const msg = document.createElement('div');
            msg.className = `message ${sender}`;
            msg.textContent = text;
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return msg;
        }

        function cleanForSpeech(text) {
            return text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
        }

        function speak(text) {
            const cleanText = cleanForSpeech(text);
            utterance.text = cleanText;
            utterance.pitch = 1.35;      // Higher pitch = more kid-like
            utterance.rate = 1.05;       // Slightly faster for energy
            utterance.volume = 0.95;

            speechSynthesis.speak(utterance);
        }

        async function sendMessage(userText = null) {
            const input = document.getElementById('userInput');
            const text = userText || input.value.trim();
            if (!text) return;

            if (!userText) addMessage(text, 'user');
            input.value = '';

            const thinking = addMessage("Thinking... 🤔", 'grok');

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "You are a warm, playful, and safe best friend for 5-year-old Bonnie. Use very simple words, lots of excitement, be encouraging and fun. Keep answers short." },
                            { role: "user", content: text }
                        ],
                        temperature: 0.9,
                        max_tokens: 300
                    })
                });

                const data = await res.json();
                const reply = data.choices[0].message.content;
                thinking.remove();
                addMessage(reply, 'grok');
                speak(reply);
            } catch(e) {
                thinking.remove();
                const errMsg = "Oopsie! Try again 🐻";
                addMessage(errMsg, 'grok');
                speak(errMsg);
            }
        }

        // Continuous Voice Input
        function toggleContinuous() {
            const status = document.getElementById('status');
            if (isContinuousOn) {
                if (continuousRecognition) continuousRecognition.stop();
                isContinuousOn = false;
                status.textContent = "Continuous listening is OFF";
            } else {
                startContinuousListening();
                isContinuousOn = true;
                status.textContent = "🎤 Listening... Talk anytime!";
            }
        }

        function startContinuousListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Continuous listening not supported in this browser.");
                return;
            }

            continuousRecognition = new SpeechRecognition();
            continuousRecognition.continuous = true;
            continuousRecognition.interimResults = false;

            continuousRecognition.onresult = (event) => {
                const spoken = event.results[event.results.length - 1][0].transcript;
                if (spoken.length > 3) {   // Ignore very short sounds
                    sendMessage(spoken);
                }
            };

            continuousRecognition.onerror = () => {
                setTimeout(() => {
                    if (isContinuousOn) startContinuousListening();
                }, 1000);
            };

            continuousRecognition.start();
        }
    </script>
</body>
</html>
