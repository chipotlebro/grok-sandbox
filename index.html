<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonnie's Grok Buddy 🌟</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: linear-gradient(135deg, #ff9a9e, #fad0c4); margin: 0; padding: 20px; color: #333; }
        .chat-container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #4a90e2; color: white; padding: 20px; text-align: center; font-size: 2.2em; }
        .messages { height: 65vh; overflow-y: auto; padding: 20px; background: #f9f9f9; }
        .message { margin: 15px 0; padding: 15px 20px; border-radius: 20px; max-width: 80%; font-size: 1.1em; line-height: 1.4; }
        .user { background: #4a90e2; color: white; margin-left: auto; border-bottom-right-radius: 5px; }
        .grok { background: #fff; border: 2px solid #ff6b6b; margin-right: auto; border-bottom-left-radius: 5px; }
        input { width: 100%; padding: 18px; border: none; font-size: 1.2em; box-sizing: border-box; }
        button { padding: 18px 40px; background: #ff6b6b; color: white; border: none; font-size: 1.3em; cursor: pointer; border-radius: 10px; }
        .kid-safe { text-align: center; color: #666; padding: 15px; font-size: 0.95em; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">🌟 Bonnie's Grok Buddy 🌟</div>
        <div class="messages" id="messages">
            <div class="message grok">Hi Bonnie! I'm your super fun Grok buddy 🦄 What do you want to talk about today?</div>
        </div>
        <input type="text" id="userInput" placeholder="Ask me anything..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <div style="padding: 15px; text-align: center; background: white;">
            <button onclick="sendMessage()">Send Message 🚀</button>
        </div>
        <div class="kid-safe">Made with love for Bonnie • Supervised by Daddy</div>
    </div>

    <script>
        const GROQ_API_KEY = "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";

        const messagesDiv = document.getElementById('messages');

        function addMessage(text, sender) {
            const msg = document.createElement('div');
            msg.className = `message ${sender}`;
            msg.textContent = text;
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return msg;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';

            const thinking = addMessage("Thinking... 🤔", 'grok');

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [
                            { 
                                role: "system", 
                                content: "You are a warm, fun, and safe friend for a 5-year-old girl named Bonnie. Use very simple words, lots of emojis, be encouraging, and keep answers short and exciting. Never scary topics."
                            },
                            { role: "user", content: text }
                        ],
                        temperature: 0.85,
                        max_tokens: 400
                    })
                });

                const data = await res.json();
                thinking.remove();
                const reply = data.choices[0].message.content;
                addMessage(reply, 'grok');
            } catch(e) {
                thinking.remove();
                addMessage("Oops! Having a little trouble. Try again! 🐻", 'grok');
            }
        }
    </script>
</body>
</html>
