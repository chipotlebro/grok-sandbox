<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonnie's Grok Buddy</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            background: #ff69b4; 
            margin: 0; padding: 0; color: #333; 
        }
        .chat-container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 30px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.25); 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
        }
        .header { 
            background: linear-gradient(#ff1493, #4a90e2); 
            color: white; 
            padding: 25px; 
            font-size: 2.4em; 
            text-align: center; 
        }
        .messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 25px; 
            background: #fff9fb; 
        }
        .message { 
            margin: 18px 0; 
            padding: 18px 24px; 
            border-radius: 25px; 
            max-width: 85%; 
            font-size: 1.25em; 
            line-height: 1.5; 
        }
        .user { background: #4a90e2; color: white; margin-left: auto; border-bottom-right-radius: 8px; }
        .grok { background: #fff; border: 4px solid #ff69b4; margin-right: auto; border-bottom-left-radius: 8px; }
        button { 
            padding: 20px 50px; 
            background: #ff1493; 
            color: white; 
            border: none; 
            font-size: 1.6em; 
            cursor: pointer; 
            border-radius: 50px; 
            margin: 20px auto; 
            display: block; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .status { 
            text-align: center; 
            color: white; 
            font-weight: bold; 
            padding: 15px; 
            background: #ff1493; 
            font-size: 1.3em;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">🌟 Bonnie's Grok Buddy 🌟</div>
        
        <div class="messages" id="messages">
            <div class="message grok">Hi Bonnie! I'm your fun Grok buddy! Talk to me anytime ✨</div>
        </div>

        <div style="padding: 25px; text-align: center; background: white;">
            <button onclick="toggleContinuous()">🎤 Start Talking to Me</button>
        </div>
        <div class="status" id="status">Press the button to start</div>
    </div>

    <script>
        const GROQ_API_KEY = "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";
        const messagesDiv = document.getElementById('messages');
        const utterance = new SpeechSynthesisUtterance();
        let continuousRecognition = null;
        let isContinuousOn = false;
        let isSpeaking = false;

        function addMessage(text, sender) {
            const msg = document.createElement('div');
            msg.className = `message ${sender}`;
            msg.textContent = text;
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function cleanForSpeech(text) {
            return text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
        }

        function speak(text) {
            isSpeaking = true;
            const cleanText = cleanForSpeech(text);
            utterance.text = cleanText;
            utterance.pitch = 1.35;
            utterance.rate = 0.78;   // Nice and slow
            utterance.onend = () => { isSpeaking = false; };
            speechSynthesis.speak(utterance);
        }

        async function sendMessage(userText) {
            if (isSpeaking) return;

            addMessage(userText, 'user');

            const thinking = addMessage("Thinking... 🤔", 'grok');

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "You are a warm, playful friend for 5-year-old Bonnie. Use very simple words, be encouraging and fun. Keep answers short." },
                            { role: "user", content: userText }
                        ],
                        temperature: 0.9,
                        max_tokens: 280
                    })
                });

                const data = await res.json();
                const reply = data.choices[0].message.content;
                thinking.remove();
                addMessage(reply, 'grok');
                speak(reply);
            } catch(e) {
                if (thinking && thinking.parentNode) thinking.remove();
                const errMsg = "Oopsie! Try again 🐻";
                addMessage(errMsg, 'grok');
                speak(errMsg);
            }
        }

        function toggleContinuous() {
            const status = document.getElementById('status');
            if (isContinuousOn) {
                if (continuousRecognition) continuousRecognition.stop();
                isContinuousOn = false;
                status.textContent = "Listening stopped";
            } else {
                startContinuousListening();
                isContinuousOn = true;
                status.textContent = "🎤 Listening... Talk to me!";
            }
        }

        function startContinuousListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Voice not supported. Try Chrome.");

            continuousRecognition = new SpeechRecognition();
            continuousRecognition.continuous = true;
            continuousRecognition.interimResults = false;
            continuousRecognition.lang = "en-US";

            continuousRecognition.onresult = (event) => {
                if (isSpeaking) return;
                const spoken = event.results[event.results.length - 1][0].transcript.trim();
                if (spoken.length > 3) sendMessage(spoken);
            };

            continuousRecognition.onerror = () => { if (isContinuousOn) setTimeout(startContinuousListening, 1000); };
            continuousRecognition.onend = () => { if (isContinuousOn) setTimeout(startContinuousListening, 700); };

            continuousRecognition.start();
        }
    </script>
</body>
</html>
